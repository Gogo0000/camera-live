name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip python3-setuptools \
          git zip unzip openjdk-17-jdk \
          libffi-dev libssl-dev \
          autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev \
          cmake libsqlite3-dev

    - name: Install buildozer
      run: |
        pip3 install --upgrade pip
        pip3 install buildozer cython==0.29.36

    - name: Accept Android licenses
      run: |
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        yes | buildozer android debug 2>&1 | head -5 || true
        find ~/.buildozer -name "sdkmanager" 2>/dev/null | head -1 | xargs -I{} sh -c 'yes | {} --licenses' || true

    - name: Build APK
      run: |
        buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: cyber-dashboard-apk
        path: bin/*.apk
