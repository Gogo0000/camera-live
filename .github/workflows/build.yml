name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip python3-setuptools \
          git zip unzip \
          libffi-dev libssl-dev \
          autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev \
          cmake libsqlite3-dev

    - name: Install buildozer
      run: |
        pip3 install --upgrade pip
        pip3 install buildozer cython==0.29.36

    - name: Pre-accept all Android licenses
      run: |
        mkdir -p $HOME/.buildozer/android/platform/android-sdk/licenses
        echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo -e "\nd56f5187479451eabf01fb78af6dfcb131a6481e" >> $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
        echo -e "\n33b6637563c2798182a573925ec97d0240a9f2c2" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-googletv-license
        echo -e "\ne9acab5b5fbb560a72cfaecce8946896ff6aab9d" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-arm-dbt-license
        echo -e "\n601085b94cd77f0b54ff86406957099ebe79c4d6" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license-old
        echo -e "\n859f317696f67ef3d7f30a50a5560e7834b43903" > $HOME/.buildozer/android/platform/android-sdk/licenses/mips-android-sysimage-license
        echo -e "\n33b6637563c2798182a573925ec97d0240a9f2c2" >> $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license

    - name: Build APK
      run: |
        yes | buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: cyber-dashboard-apk
        path: bin/*.apk
        if-no-files-found: warn
